name: Zyphroa - Allure Test Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Install Chrome and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            chromium-chromedriver \
            libxss1 \
            libappindicator1 \
            libindicator7 \
            fonts-liberation \
            xdg-utils \
            libu2f-udev \
            libvulkan1 \
            ca-certificates
          which chromedriver
          chromedriver --version
          google-chrome --version

      - name: Run Tests
        run: mvn clean test -DskipTests=false -Dmaven.test.failure.ignore=true
        working-directory: ./automation/test
        env:
          CHROMEDRIVER_PATH: /usr/bin/chromedriver
          CHROME_BIN: /usr/bin/google-chrome
          CHROMIUM_FLAGS: "--headless --no-sandbox --disable-dev-shm-usage --disable-gpu --disable-web-security --allow-running-insecure-content"

      # Install Allure CLI
      - name: Install Allure CLI
        run: |
          sudo apt-add-repository ppa:qameta/allure
          sudo apt-get update
          sudo apt-get install -y allure

      # Generate Allure Report
      - name: Generate Allure Report
        run: allure generate ./automation/test/target/allure-results --clean -o allure-report
        continue-on-error: true

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
